<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query.code - Die Entwickler-Suchmaschine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col justify-between">

    <main class="flex-grow flex flex-col items-center justify-center px-4 py-12">
        
        <div class="text-center mb-8">
            <h1 class="text-5xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                Query.code
            </h1>
            <p class="text-gray-400 mt-2 text-sm">Suchmaschine für Entwickler-Wissen</p>
        </div>

        <div class="w-full max-w-2xl">
            <form id="search-form" class="flex gap-2">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Suche nach Python, Tutorials, Funktionen..." 
                    class="w-full px-5 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-500"
                    required
                >
                <button 
                    type="submit" 
                    class="px-6 py-3 bg-blue-600 hover:bg-blue-500 font-semibold rounded-lg transition-colors"
                >
                    Suchen
                </button>
            </form>
        </div>

        <div id="results" class="w-full max-w-2xl mt-12 space-y-6 hidden">
            </div>

        <div id="loading" class="mt-8 text-gray-400 hidden">
            Suche läuft...
        </div>

    </main>

    <footer class="py-6 text-center text-xs text-gray-600 border-t border-gray-800">
        Query.code is open source. Powered by GitHub Pages & Supabase.
    </footer>

    <script src="app.js"></script>
</body>
</html>
